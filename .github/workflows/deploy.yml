name: Deploy to EC2

on:
  push:
    branches: [live]

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit --pretty

  deploy:
    name: Blue-Green Deploy to EC2
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            /home/ubuntu/zavis-deploy/deploy.sh
