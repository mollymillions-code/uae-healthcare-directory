name: Deploy to EC2

on:
  push:
    branches: [live]

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit --pretty

  deploy:
    name: Deploy to EC2
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            LIVE_DIR=/home/ubuntu/zavis-landing
            BUILD_DIR=/home/ubuntu/zavis-landing-build

            echo "===== ZERO-DOWNTIME DEPLOY START ====="
            echo "Time: $(date -u)"
            echo "Site is LIVE throughout this entire build."

            # 1. Prepare build directory (separate from live)
            rm -rf $BUILD_DIR
            mkdir -p $BUILD_DIR

            # 2. Pull latest code into live dir (code only, .next untouched)
            cd $LIVE_DIR
            git checkout -- .
            CURRENT_BRANCH=$(git branch --show-current)
            if [ "$CURRENT_BRANCH" != "live" ]; then
              echo "[branch] Switching from $CURRENT_BRANCH to live..."
              git fetch origin live
              git clean -fd .vscode/ 2>/dev/null || true
              git checkout live
              git branch --set-upstream-to=origin/live live
            fi
            git pull origin live

            # 3. Copy source into build directory
            echo "[build] Copying source to build dir..."
            rsync -a --exclude='.next' --exclude='node_modules' --exclude='.git' \
              $LIVE_DIR/ $BUILD_DIR/

            # Copy node_modules (faster than npm install from scratch)
            cp -a $LIVE_DIR/node_modules $BUILD_DIR/node_modules 2>/dev/null || true

            # Install any new/changed deps
            cd $BUILD_DIR
            npm install

            # Copy env file
            cp $LIVE_DIR/.env.local $BUILD_DIR/.env.local 2>/dev/null || true

            # 4. Build in the isolated directory — PM2 keeps serving from LIVE_DIR
            echo "[build] Starting build in isolated dir..."
            if npm run build; then
              echo "[build] SUCCESS — BUILD_ID: $(cat $BUILD_DIR/.next/BUILD_ID)"
            else
              echo "[build] FAILED — site still running, no changes made"
              rm -rf $BUILD_DIR || true
              exit 1
            fi

            # 5. Atomic swap: move new .next into live dir
            echo "[swap] Swapping .next directories..."
            cd $LIVE_DIR

            # Also sync any new/changed deps into live
            rsync -a $BUILD_DIR/node_modules/ $LIVE_DIR/node_modules/

            rm -rf .next.old
            mv .next .next.old 2>/dev/null || true
            mv $BUILD_DIR/.next .next

            # Clean up any temp fallback process from manual recovery
            pm2 delete zavis-landing-temp 2>/dev/null || true
            rm -rf /home/ubuntu/zavis-landing-temp-serve 2>/dev/null || true

            pm2 restart zavis-landing

            # 6. Health check — if app doesn't respond, rollback
            sleep 4
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3200/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "[health] Site responding OK (HTTP $HTTP_CODE)"
              rm -rf .next.old
              rm -rf $BUILD_DIR
            else
              echo "[health] Site NOT responding (HTTP $HTTP_CODE) — rolling back"
              rm -rf .next
              if [ -d .next.old ]; then
                mv .next.old .next
                echo "[rollback] Restored previous build"
              fi
              pm2 restart zavis-landing
              sleep 3
              rm -rf $BUILD_DIR
              exit 1
            fi

            # 7. Verification
            echo "===== DEPLOY VERIFICATION ====="
            echo "Server SHA: $(git rev-parse HEAD | cut -c1-7)"
            echo "Server Time: $(date -u)"
            echo "PM2 Status: $(pm2 jlist | python3 -c "import sys,json; procs=json.load(sys.stdin); landing=[p for p in procs if p['name']=='zavis-landing']; print(landing[0]['pm2_env']['status'] if landing else 'NOT FOUND')")"
            echo "Health Check: $(curl -s http://localhost:3200/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"OK — {d['version']['short']} — {d['version']['message']}\")" 2>/dev/null || echo "FAILED")"
            echo "==============================="
