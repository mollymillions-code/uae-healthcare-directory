name: Deploy to EC2

on:
  push:
    branches: [live]

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit --pretty

  deploy:
    name: Blue-Green Deploy to EC2
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.repository == 'zavis-support/zavis-landing'
    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/ec2.pem -o ConnectTimeout=30 -o ServerAliveInterval=60 -o ServerAliveCountMax=40 ubuntu@${{ secrets.EC2_HOST }} '/home/ubuntu/zavis-deploy/deploy.sh'
