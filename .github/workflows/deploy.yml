name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit --pretty

  deploy:
    name: Deploy to EC2
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/zavis-landing
            git checkout -- .
            git pull origin main
            npm install
            npm run build
            pm2 restart zavis-landing
            echo "===== DEPLOY VERIFICATION ====="
            echo "Server SHA: $(git rev-parse HEAD | cut -c1-7)"
            echo "Server Time: $(date -u)"
            echo "PM2 Status: $(pm2 jlist | python3 -c "import sys,json; procs=json.load(sys.stdin); landing=[p for p in procs if p['name']=='zavis-landing']; print(landing[0]['pm2_env']['status'] if landing else 'NOT FOUND')")"
            echo "Health Check: $(curl -s http://localhost:3200/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"OK — {d['version']['short']} — {d['version']['message']}\")" 2>/dev/null || echo "FAILED")"
            echo "==============================="
