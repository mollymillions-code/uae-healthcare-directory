name: Deploy to EC2

on:
  push:
    branches: [live]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit --pretty

  deploy:
    name: Deploy to EC2
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            DEPLOY_DIR=/home/ubuntu/zavis-landing
            BACKUP_DIR=/home/ubuntu/zavis-landing-backup
            cd $DEPLOY_DIR

            echo "===== SAFE DEPLOY START ====="
            echo "Time: $(date -u)"

            # 1. Backup current working .next before touching anything
            if [ -d .next ] && [ -f .next/BUILD_ID ]; then
              echo "[backup] Saving current .next as fallback..."
              rm -rf $BACKUP_DIR/.next
              mkdir -p $BACKUP_DIR
              cp -a .next $BACKUP_DIR/.next
              echo "[backup] Saved BUILD_ID: $(cat $BACKUP_DIR/.next/BUILD_ID)"
            else
              echo "[backup] No valid .next to backup — proceeding anyway"
            fi

            # 2. Pull latest code (switch to live branch if still on main)
            git checkout -- .
            CURRENT_BRANCH=$(git branch --show-current)
            if [ "$CURRENT_BRANCH" != "live" ]; then
              echo "[branch] Switching from $CURRENT_BRANCH to live..."
              git fetch origin live
              # Clean untracked files that conflict with the live branch
              git clean -fd .vscode/ 2>/dev/null || true
              git checkout live
              git branch --set-upstream-to=origin/live live
            fi
            git pull origin live
            npm install

            # 3. Build into .next-new so PM2 keeps serving old .next the entire time
            echo "[build] Starting build into .next-new..."
            rm -rf .next-new
            if NEXT_DIST_DIR=.next-new npm run build; then
              echo "[build] SUCCESS — new BUILD_ID: $(cat .next-new/BUILD_ID)"
            else
              echo "[build] FAILED — .next untouched, site still serving old build"
              rm -rf .next-new
              exit 1
            fi

            # 4. Atomic swap: replace .next with the completed new build
            echo "[swap] Swapping .next-new → .next..."
            rm -rf .next
            mv .next-new .next
            echo "[swap] Done — BUILD_ID: $(cat .next/BUILD_ID)"

            # 5. Restart PM2 (now pointing at a complete, valid build)
            pm2 restart zavis-landing

            # 6. Health check — if app doesn't respond, rollback
            sleep 4
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3200/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "[health] Site responding OK (HTTP $HTTP_CODE)"
            else
              echo "[health] Site NOT responding (HTTP $HTTP_CODE) — rolling back"
              if [ -d $BACKUP_DIR/.next ]; then
                rm -rf .next
                cp -a $BACKUP_DIR/.next .next
                pm2 restart zavis-landing
                sleep 3
                echo "[health] Rolled back to BUILD_ID: $(cat .next/BUILD_ID)"
              fi
              exit 1
            fi

            # 7. Verification
            echo "===== DEPLOY VERIFICATION ====="
            echo "Server SHA: $(git rev-parse HEAD | cut -c1-7)"
            echo "Server Time: $(date -u)"
            echo "PM2 Status: $(pm2 jlist | python3 -c "import sys,json; procs=json.load(sys.stdin); landing=[p for p in procs if p['name']=='zavis-landing']; print(landing[0]['pm2_env']['status'] if landing else 'NOT FOUND')")"
            echo "Health Check: $(curl -s http://localhost:3200/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"OK — {d['version']['short']} — {d['version']['message']}\")" 2>/dev/null || echo "FAILED")"
            echo "==============================="
