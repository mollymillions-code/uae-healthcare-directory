name: Deploy to EC2

on:
  push:
    branches: [live]

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit --pretty

  deploy:
    name: Deploy to EC2
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            DEPLOY_DIR=/home/ubuntu/zavis-landing
            BACKUP_DIR=/home/ubuntu/zavis-landing-backup
            TEMP_DIR=/home/ubuntu/zavis-landing-temp-serve
            cd $DEPLOY_DIR

            echo "===== NEAR-ZERO-DOWNTIME DEPLOY ====="
            echo "Time: $(date -u)"

            # 1. Backup current .next
            if [ -d .next ] && [ -f .next/BUILD_ID ]; then
              echo "[backup] Saving current .next..."
              rm -rf $BACKUP_DIR/.next
              mkdir -p $BACKUP_DIR
              cp -a .next $BACKUP_DIR/.next
              echo "[backup] Saved BUILD_ID: $(cat $BACKUP_DIR/.next/BUILD_ID)"
            fi

            # 2. Start temp server from backup so site stays live during build
            if [ -d $BACKUP_DIR/.next ] && [ -f $BACKUP_DIR/.next/BUILD_ID ]; then
              echo "[temp] Starting temp server from backup..."
              rm -rf $TEMP_DIR
              mkdir -p $TEMP_DIR
              cp -a $BACKUP_DIR/.next $TEMP_DIR/.next
              cp $DEPLOY_DIR/package.json $TEMP_DIR/
              cp -a $DEPLOY_DIR/node_modules $TEMP_DIR/node_modules
              cp -a $DEPLOY_DIR/public $TEMP_DIR/ 2>/dev/null || true
              cp $DEPLOY_DIR/.env.local $TEMP_DIR/ 2>/dev/null || true
              cp -a $DEPLOY_DIR/data $TEMP_DIR/ 2>/dev/null || true

              pm2 stop zavis-landing 2>/dev/null || true
              cd $TEMP_DIR
              pm2 start node_modules/.bin/next --name zavis-landing-temp -- start -p 3200
              sleep 3
              TEMP_HTTP=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3200/ || echo "000")
              echo "[temp] Temp server: HTTP $TEMP_HTTP"
              cd $DEPLOY_DIR
            else
              echo "[temp] No backup available — site will be down during build"
              pm2 stop zavis-landing 2>/dev/null || true
            fi

            # 3. Pull latest code
            git checkout -- .
            CURRENT_BRANCH=$(git branch --show-current)
            if [ "$CURRENT_BRANCH" != "live" ]; then
              echo "[branch] Switching from $CURRENT_BRANCH to live..."
              git fetch origin live
              git clean -fd .vscode/ 2>/dev/null || true
              git checkout live
              git branch --set-upstream-to=origin/live live
            fi
            git pull origin live
            npm install

            # 4. Build in place (temp server keeps site live)
            echo "[build] Starting build..."
            rm -rf .next
            if NODE_OPTIONS="--max-old-space-size=4096" npm run build; then
              echo "[build] SUCCESS — BUILD_ID: $(cat .next/BUILD_ID)"
            else
              echo "[build] FAILED — restoring backup"
              rm -rf .next
              if [ -d $BACKUP_DIR/.next ]; then
                cp -a $BACKUP_DIR/.next .next
              fi
              pm2 delete zavis-landing-temp 2>/dev/null || true
              rm -rf $TEMP_DIR
              pm2 restart zavis-landing
              exit 1
            fi

            # 5. Swap: stop temp, start main with new build
            echo "[swap] Switching to new build..."
            pm2 delete zavis-landing-temp 2>/dev/null || true
            rm -rf $TEMP_DIR
            pm2 restart zavis-landing

            # 6. Health check
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3200/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "[health] Site responding OK (HTTP $HTTP_CODE)"
            else
              echo "[health] NOT responding (HTTP $HTTP_CODE) — rolling back"
              if [ -d $BACKUP_DIR/.next ]; then
                rm -rf .next
                cp -a $BACKUP_DIR/.next .next
                pm2 restart zavis-landing
                sleep 3
              fi
              exit 1
            fi

            # 7. Verification
            echo "===== DEPLOY COMPLETE ====="
            echo "SHA: $(git rev-parse HEAD | cut -c1-7)"
            echo "Time: $(date -u)"
            echo "PM2: $(pm2 jlist | python3 -c "import sys,json; procs=json.load(sys.stdin); landing=[p for p in procs if p['name']=='zavis-landing']; print(landing[0]['pm2_env']['status'] if landing else 'NOT FOUND')")"
            echo "Health: $(curl -s http://localhost:3200/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"OK — {d['version']['short']} — {d['version']['message']}\")" 2>/dev/null || echo "FAILED")"
            echo "============================"
