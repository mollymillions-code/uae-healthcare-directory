name: Full content pipeline (with review + images)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run pipeline on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 25m
          script: |
            cd /home/ubuntu/zavis-landing
            git pull origin main
            mkdir -p public/images/intelligence
            npx tsx scripts/run-pipeline-persist.ts

            # Commit generated images if any
            git add public/images/intelligence/*.jpg 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "No new images to commit"
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git commit -m "auto: add generated article images [skip ci]"
              git push origin main
            fi

            echo "Pipeline complete: $(date -u)"
