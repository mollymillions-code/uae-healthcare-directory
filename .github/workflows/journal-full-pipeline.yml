name: Full content pipeline (with review + images)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create images directory
        run: mkdir -p public/images/intelligence

      - name: Run full pipeline with review + images
        run: npx tsx scripts/run-pipeline-persist.ts

      - name: Commit generated images back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/intelligence/*.jpg 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new images to commit"
          else
            git commit -m "auto: add generated article images [skip ci]"
            git push
          fi

      - name: Trigger site revalidation
        run: |
          curl -s "https://uae-healthcare-directory.vercel.app/api/revalidate?secret=${{ secrets.CRON_SECRET }}&path=/intelligence" || true
