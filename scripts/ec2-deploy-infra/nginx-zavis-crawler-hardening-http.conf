# Include this file from nginx `http {}` before the `server {}` blocks for
# zavis.ai. It intentionally contains only http-context maps/zones, so it can
# be syntax-tested separately before production installation.

map $http_user_agent $zavis_blocked_crawler {
    default 0;
    ~*(SemrushBot|AhrefsBot|DotBot|Bytespider|PetalBot|Amazonbot|MJ12bot|Brightbot|ClaudeBot|PerplexityBot|YandexBot|Baiduspider|AliyunSecBot) 1;
}

map $http_user_agent $zavis_rate_limited_crawler {
    default "";
    ~*(Googlebot|GoogleOther|bingbot|Applebot|ChatGPT-User|GPTBot|OAI-SearchBot) $binary_remote_addr;
}

# Empty keys are not accounted by limit_req, so normal users are not charged
# against this crawler bucket.
limit_req_zone $zavis_rate_limited_crawler zone=zavis_crawler_per_ip:20m rate=2r/s;
