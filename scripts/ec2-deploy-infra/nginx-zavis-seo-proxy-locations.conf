# Include inside the canonical `server {}` for www.zavis.ai after static asset
# locations and before the generic `location /` proxy.

if ($zavis_blocked_crawler) {
    return 429;
}

set $zavis_direct_rsc 0;
if ($arg__rsc != "") {
    set $zavis_direct_rsc 1;
}
if ($http_rsc = "1") {
    set $zavis_direct_rsc 0;
}
if ($http_next_router_state_tree != "") {
    set $zavis_direct_rsc 0;
}
if ($http_next_router_prefetch != "") {
    set $zavis_direct_rsc 0;
}
if ($http_next_url != "") {
    set $zavis_direct_rsc 0;
}
if ($zavis_direct_rsc = 1) {
    return 301 $scheme://$host$uri;
}

location ~ ^/(ar/|tr/)?(directory|find-a-doctor|professionals|insurance|pricing|labs|specialties|medications|best)(/|$) {
    limit_req zone=zavis_crawler_per_ip burst=40 nodelay;

    proxy_pass http://zavis_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering on;

    add_header Cache-Control "public, max-age=300, s-maxage=3600, stale-while-revalidate=86400" always;
    add_header CDN-Cache-Control "public, max-age=3600, stale-while-revalidate=86400" always;
    add_header X-Zavis-SEO-Cache "public-html" always;
}
